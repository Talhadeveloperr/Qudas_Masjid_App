<body class="bg-background text-on-background font-body-md min-h-screen">

</div>
<button class="material-symbols-outlined text-primary dark:text-primary-fixed hover:bg-surface-container dark:hover:bg-surface-variant p-2 rounded-full transition-all duration-200 active:scale-95">
            notifications
        </button>
</header>
<!-- Main Content Canvas -->
<main class="px-margin-mobile pt-lg pb-xxl max-w-lg mx-auto">
<!-- Quick Stats Overview (Context for the form) -->
<section class="mb-xl grid grid-cols-2 gap-md">
<div class="bg-surface-container p-md rounded-xl shadow-sm">

<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mt-xs">$4,250</h2>
</div>
<div class="bg-surface-container-low p-md rounded-xl shadow-sm border border-outline-variant/30">
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Target</p>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-secondary mt-xs">$5,000</h2>
</div>
</section>
<!-- The "Add Contribution" Overlay/Form Container -->
<div class="bg-surface-container-lowest rounded-xl shadow-xl overflow-hidden border border-outline-variant/20 relative" id="contribution-modal">
<div class="p-lg bg-primary text-on-primary flex justify-between items-center">
<div>
<h3 class="font-title-lg text-title-lg">Add Contribution</h3>
<p class="font-body-md text-body-md opacity-80">Manual entry for masjid funds</p>
</div>
<span class="material-symbols-outlined text-[32px]">volunteer_activism</span>
</div>
<form class="p-lg space-y-lg" id="donationForm">
<!-- Amount Display (Main Focus) -->
<div class="text-center pb-md">
<label class="font-label-md text-label-md text-outline uppercase">Entry Amount</label>
<div class="flex items-center justify-center gap-xs mt-xs">
<span class="font-display-lg text-display-lg text-primary">$</span>
<input class="bg-transparent border-none p-0 font-display-lg text-display-lg text-primary w-48 text-center focus:ring-0" id="amountInput" readonly="" type="text" value="0"/>
</div>
</div>
<!-- Input Fields -->
<div class="space-y-md">
<div class="group">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs ml-1">Contributor Name (Optional)</label>
<div class="flex items-center bg-surface-container-low rounded-xl px-md py-sm border-b-2 border-transparent group-focus-within:border-primary transition-all">
<span class="material-symbols-outlined text-outline mr-sm">person</span>
<input class="bg-transparent border-none w-full p-0 text-body-lg font-body-lg focus:ring-0 placeholder:text-outline-variant" placeholder="e.g. Abdullah Ahmed" type="text"/>
</div>
</div>
<div class="grid grid-cols-2 gap-md">
<div class="group">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs ml-1">Date</label>
<div class="flex items-center bg-surface-container-low rounded-xl px-md py-sm border-b-2 border-transparent group-focus-within:border-primary transition-all">
<span class="material-symbols-outlined text-outline mr-sm">calendar_today</span>
<input class="bg-transparent border-none w-full p-0 text-body-md font-body-md focus:ring-0" type="text" value="Oct 24, 2023"/>
</div>
</div>
<div class="group">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs ml-1">Time</label>
<div class="flex items-center bg-surface-container-low rounded-xl px-md py-sm border-b-2 border-transparent group-focus-within:border-primary transition-all">
<span class="material-symbols-outlined text-outline mr-sm">schedule</span>
<input class="bg-transparent border-none w-full p-0 text-body-md font-body-md focus:ring-0" id="currentTime" type="text" value="14:30"/>
</div>
</div>
</div>
<div class="group">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs ml-1">Remarks</label>
<div class="flex items-start bg-surface-container-low rounded-xl px-md py-sm border-b-2 border-transparent group-focus-within:border-primary transition-all">
<span class="material-symbols-outlined text-outline mr-sm mt-1">notes</span>
<textarea class="bg-transparent border-none w-full p-0 text-body-md font-body-md focus:ring-0 resize-none placeholder:text-outline-variant" placeholder="General Sadaqah / Friday Collection" rows="2"></textarea>
</div>
</div>
</div>
<!-- Numeric Keypad -->
<div class="bg-surface-container-low rounded-xl p-md grid grid-cols-3 gap-sm">
<button class="num-pad-btn" onclick="appendNum('1')" type="button">1</button>
<button class="num-pad-btn" onclick="appendNum('2')" type="button">2</button>
<button class="num-pad-btn" onclick="appendNum('3')" type="button">3</button>
<button class="num-pad-btn" onclick="appendNum('4')" type="button">4</button>
<button class="num-pad-btn" onclick="appendNum('5')" type="button">5</button>
<button class="num-pad-btn" onclick="appendNum('6')" type="button">6</button>
<button class="num-pad-btn" onclick="appendNum('7')" type="button">7</button>
<button class="num-pad-btn" onclick="appendNum('8')" type="button">8</button>
<button class="num-pad-btn" onclick="appendNum('9')" type="button">9</button>
<button class="num-pad-btn" onclick="appendNum('.')" type="button">.</button>
<button class="num-pad-btn" onclick="appendNum('0')" type="button">0</button>
<button class="num-pad-btn text-error" onclick="clearNum()" type="button">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
<!-- Action Button -->
<button class="w-full bg-primary text-on-primary py-4 rounded-xl font-title-lg text-title-lg shadow-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
                    Confirm Contribution

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 pb-4 pt-2 bg-surface dark:bg-inverse-surface shadow-[0_-4px_12px_rgba(0,78,45,0.08)] rounded-t-xl">

<span class="material-symbols-outlined">home</span>
<span class="font-label-md text-label-md">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary-container dark:bg-primary text-on-primary-container dark:text-on-primary rounded-full px-4 py-1 transition-transform duration-300 active:scale-90" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">volunteer_activism</span>
<span class="font-label-md text-label-md">Giving</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 transition-transform duration-300 active:scale-90 hover:text-primary" href="#">
<span class="material-symbols-outlined">analytics</span>
<span class="font-label-md text-label-md">Insights</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 transition-transform duration-300 active:scale-90 hover:text-primary" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-label-md text-label-md">Profile</span>
</a>
</nav>
<script>
        // Numeric Keypad Logic
        const amountDisplay = document.getElementById('amountInput');
        let currentAmount = "0";

        function appendNum(val) {
            if (currentAmount === "0" && val !== ".") {
                currentAmount = val;
            } else {
                if (val === "." && currentAmount.includes(".")) return;
                currentAmount += val;
            }
            updateDisplay();
        }

        function clearNum() {
            if (currentAmount.length > 1) {
                currentAmount = currentAmount.slice(0, -1);
            } else {
                currentAmount = "0";
            }
            updateDisplay();
        }

        function updateDisplay() {
            amountDisplay.value = currentAmount;
        }

        // Auto-update time
        function setTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('currentTime').value = `${hours}:${minutes}`;
        }
        
        setTime();

        // Form Submission Interaction
        document.getElementById('donationForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Saving...';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Contribution Saved';
                btn.classList.remove('bg-primary');
                btn.classList.add('bg-secondary');
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                    btn.classList.remove('bg-secondary');
                    btn.classList.add('bg-primary');
                    currentAmount = "0";
                    updateDisplay();
                    e.target.reset();
                    setTime();
                }, 2000);
            }, 1200);
        });
    </script>
</body></html>
